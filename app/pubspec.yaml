name: xuyan
description: "序言 - 社交聊天App"
publish_to: 'none'
version: 1.1.6+16

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.4.3+1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  image_picker: ^1.0.7
  record: ^5.0.0
  audioplayers: ^5.2.1
  socket_io_client: ^3.0.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.1.2
  photo_view: ^0.15.0
  open_file: ^3.5.7
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5B8DB8"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
