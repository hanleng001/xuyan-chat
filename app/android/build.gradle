allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Fix missing namespace for older plugins (record, etc.) with AGP 8.x
gradle.beforeProject { project ->
    project.pluginManager.withPlugin("com.android.library") {
        def android = project.extensions.findByName("android")
        if (android != null && android.namespace == null) {
            def manifest = file("${project.projectDir}/src/main/AndroidManifest.xml")
            if (manifest.exists()) {
                def pkg = new XmlSlurper().parse(manifest).@package.toString()
                if (pkg) android.namespace = pkg
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

ext.kotlin_version = '1.9.22'
