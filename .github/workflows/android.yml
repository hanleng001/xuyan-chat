name: Build Android APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter
        run: |
          git clone --depth 1 --branch 3.24.0 https://github.com/flutter/flutter.git /opt/flutter
          /opt/flutter/bin/flutter precache --android
          /opt/flutter/bin/flutter --version
      - name: Debug dirs
        run: |
          pwd && ls -la
          ls -la app/ 2>/dev/null || echo "no app dir"
      - name: Build APK
        run: |
          cd app && /opt/flutter/bin/flutter pub get && /opt/flutter/bin/flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
